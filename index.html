<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuronOverload — Pipeline Dashboard</title>
<style>
  :root{
    --bg:#0b0b12; --card:#14141f; --line:#242435;
    --txt:#e8e8f0; --muted:#8b8ba7;
    --blue:#38bdf8; --purple:#a855f7; --ok:#22c55e; --warn:#f59e0b; --red:#ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;padding-bottom:60px}
  header{padding:22px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(168,85,247,.08))}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px}
  h1{font-size:1.5rem;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
  .grid{display:grid;gap:14px;margin-top:20px}
  .stats{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .label{color:var(--muted);font-size:.72rem;text-transform:uppercase;
    letter-spacing:.06em;font-weight:600}
  .value{font-size:1.8rem;font-weight:700;margin-top:6px}
  .value.small{font-size:1rem;font-weight:600;color:var(--muted)}
  .hint{font-size:.72rem;color:var(--muted);margin-top:4px}
  .pending{border-style:dashed;background:transparent}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;
    font-size:.68rem;font-weight:700;margin-right:4px}
  .b-ok{background:rgba(34,197,94,.15);color:var(--ok)}
  .b-warn{background:rgba(245,158,11,.15);color:var(--warn)}
  .b-info{background:rgba(56,189,248,.15);color:var(--blue)}
  .b-mut{background:rgba(139,139,167,.15);color:var(--muted)}
  h2{font-size:1.1rem;margin:28px 0 12px;display:flex;justify-content:space-between;
    align-items:center;gap:10px;flex-wrap:wrap}
  .vid{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:12px}
  .vid-title{font-weight:600;font-size:.98rem;margin-bottom:6px}
  .vid-sub{color:var(--muted);font-size:.78rem;margin-bottom:8px}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .chip{background:#1c1c2b;border:1px solid var(--line);border-radius:8px;
    padding:3px 9px;font-size:.72rem;color:var(--muted)}
  .chip b{color:var(--txt);font-weight:600}
  .prev{color:var(--muted);font-size:.8rem;font-style:italic;margin-top:6px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
  a.link{color:var(--blue);font-size:.8rem;text-decoration:none;font-weight:600}
  button{font:inherit;cursor:pointer;border-radius:9px;padding:7px 13px;
    font-size:.78rem;font-weight:600;border:1px solid var(--line);
    background:#1c1c2b;color:var(--txt)}
  button:hover{border-color:var(--blue)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .btn-go{background:var(--ok);color:#052e16;border-color:transparent}
  .btn-del{background:transparent;color:var(--red);border-color:rgba(239,68,68,.35)}
  .btn-sm{padding:5px 10px;font-size:.72rem}
  .empty{color:var(--muted);text-align:center;padding:40px 0}
  .note{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
    border-radius:12px;padding:14px;font-size:.85rem;color:#f5d9a8;margin-top:20px}
  .setup{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.25);
    border-radius:12px;padding:14px;margin-top:18px;font-size:.85rem}
  .setup input{width:100%;padding:9px;margin-top:8px;border-radius:8px;
    border:1px solid var(--line);background:#0f0f18;color:var(--txt);font-size:.85rem}
  .setup summary{cursor:pointer;color:var(--blue);font-weight:600}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;
    background:#1c1c2b;border:1px solid var(--line);padding:11px 18px;
    border-radius:10px;font-size:.85rem;display:none;z-index:99;max-width:90%}
  footer{color:var(--muted);font-size:.75rem;text-align:center;margin-top:30px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>⚡ NeuronOverload</h1>
    <div class="sub">Pipeline Dashboard — echte Daten aus <code>data/videos.json</code></div>
  </div>
</header>

<main class="wrap">
  <div class="grid stats" id="stats"></div>

  <h2>
    <span>Produzierte Videos</span>
  </h2>
  <div id="videos"><div class="empty">Lade…</div></div>

  <div class="note" id="note"></div>

  <footer>
    Uploads sind <b>nicht gelistet</b>. Freigabe per Telegram → KI plant den Zeitpunkt.<br>
    Views/Abos erscheinen, sobald YouTube dafür Daten liefert.
  </footer>
</main>

<div class="toast" id="toast"></div>

<script>
const fmtDate = iso => {
  if(!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',
    hour:'2-digit',minute:'2-digit'});
};

function statCard(label,value,hint,pending){
  return `<div class="card ${pending?'pending':''}">
    <div class="label">${label}</div>
    <div class="value ${pending?'small':''}">${value}</div>
    ${hint?`<div class="hint">${hint}</div>`:''}</div>`;
}

function render(videos){
  const total=videos.length;
  const onYt=videos.filter(v=>v.youtube_id).length;
  const pub=videos.filter(v=>v.upload_status==='public').length;
  const wait=onYt-pub;
  const last=total?videos[videos.length-1]:null;
  const avg=total?(videos.reduce((s,v)=>s+(v.duration_sec||0),0)/total).toFixed(0)+'s':'—';
  const totalViews=videos.reduce((s,v)=>s+(v.views||0),0);
  const queued=videos.filter(v=>v.approved&&v.upload_status!=='public').length;

  document.getElementById('stats').innerHTML=[
    statCard('Videos gebaut',total,total?`zuletzt ${fmtDate(last.created_at)}`:'',false),
    statCard('Ø Länge',avg,'',false),
    statCard('Auf YouTube',onYt,wait?`${wait} wartet auf Freigabe`:'',false),
    statCard('Öffentlich',pub,wait?`${wait} warten auf Freigabe`:'',!pub),
    statCard('Views gesamt', totalViews>0?totalViews:'—',
             pub?`über ${pub} öffentliche Videos`:'noch nichts öffentlich', totalViews===0),
  ].join('');

  const box=document.getElementById('videos');
  if(!total){
    box.innerHTML='<div class="empty">Noch keine Videos protokolliert.</div>';
      return;
  }
  box.innerHTML=videos.slice().reverse().map(v=>{
    const st=v.upload_status||'';
    const isPub=st==='public';
    const onYT=!!v.youtube_id;
    let state;
    if(!onYT)            state='<span class="badge b-mut">nicht hochgeladen</span>';
    else if(isPub)       state='<span class="badge b-ok">öffentlich</span>';
    else if(v.approved)  state='<span class="badge b-info">freigegeben — geplant</span>';
    else                 state='<span class="badge b-warn">wartet auf Review</span>';
    const cap=v.captions==='karaoke'
      ? '<span class="badge b-info">Karaoke</span>' : '<span class="badge b-mut">Block</span>';
    const shown=v.youtube_title||v.title||'(ohne Titel)';
    const orig=(v.youtube_title&&v.title)?`<div class="vid-sub">Thema: ${v.title}</div>`:'';
    const btnPub='';
    const lnkYT=onYT
      ? `<a class="link" href="https://youtu.be/${v.youtube_id}" target="_blank">→ YouTube</a>`:'';
    const lnkPv=v.preview_file
      ? `<a class="link" href="${v.preview_file}" target="_blank">→ Preview</a>`:'';
    return `<div class="vid">
      <div class="vid-title">${shown}</div>
      ${orig}
      <div>${state}${cap}</div>
      <div class="meta">
        <span class="chip">Gebaut <b>${fmtDate(v.created_at)}</b></span>
        <span class="chip">Länge <b>${v.duration_sec||'?'}s</b></span>
        <span class="chip">Clips <b>${v.clips??0}</b></span>
        ${(v.keywords&&v.keywords.length)
          ?`<span class="chip">Footage <b>${v.keywords.join(', ')}</b></span>`:''}
        ${v.scheduled_for&&!isPub
          ?`<span class="chip">⏰ geplant <b>${v.scheduled_for} UTC</b></span>`:''}
        ${v.published_at
          ?`<span class="chip">📢 live seit <b>${fmtDate(v.published_at)}</b></span>`:''}
        ${(v.views!==undefined&&v.views!==null)
          ?`<span class="chip">👁 <b>${v.views}</b> Views</span>`:''}
        ${(v.likes!==undefined&&v.likes!==null&&v.likes>0)
          ?`<span class="chip">👍 <b>${v.likes}</b></span>`:''}
      </div>
      ${v.schedule_reason
        ? `<div class="prev">🤖 ${v.schedule_reason} <span style="opacity:.6">(Konfidenz: ${v.schedule_confidence||'?'})</span></div>`
        : ''}
      ${v.script_preview?`<div class="prev">„${v.script_preview}…"</div>`:''}
      <div class="row">
        ${btnPub}${lnkPv}${lnkYT}

      </div>
    </div>`;
  }).join('');
}

fetch('data/videos.json?ts='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error('no data'); return r.json(); })
  .then(v=>{
    render(Array.isArray(v)?v:[]);
    document.getElementById('note').innerHTML=
      'ℹ️ Videos werden <b>nicht gelistet</b> hochgeladen. Freigeben oder löschen per <b>Telegram-Button</b>.';
  })
  .catch(()=>{
    render([]);
    document.getElementById('note').innerHTML=
      '⚠️ Noch keine <code>data/videos.json</code> — entsteht beim nächsten Lauf.';
  });

</script>
</body>
</html>
