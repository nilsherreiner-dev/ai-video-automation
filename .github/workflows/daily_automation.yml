name: Daily AI Video Automation

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 UTC = 7:00 deutscher Sommerzeit
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Video Automation
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AUTH_JSON: ${{ secrets.GOOGLE_AUTH_JSON }}
          VIDEOS_PER_RUN: ${{ secrets.VIDEOS_PER_RUN }}
        run: |
          python ai_video_engine.py

      - name: Upload videos to YouTube
        continue-on-error: true
        env:
          GOOGLE_AUTH_JSON: ${{ secrets.GOOGLE_AUTH_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python youtube_uploader_real.py

      - name: Commit previews + video log into repo
        if: always()
        run: |
          mkdir -p preview data
          rm -f preview/*.mp4
          if ls output/*.mp4 1> /dev/null 2>&1; then
            cp output/*.mp4 preview/
          fi
          git config user.name "video-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A preview data
          git commit -m "Update previews + video log [skip ci]" || echo "nothing to commit"
          git push

      - name: Notify completion
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="✅ Automation fertig. Videos im /preview Ordner, Dashboard aktualisiert."
